<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti, Sthefany 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  /* ── Stars ── */
  .stars {
    position: fixed; inset: 0; z-index: 0;
  }
  .star {
    position: absolute; width: 2px; height: 2px;
    background: #fff; border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  /* ── Floating Hearts ── */
  .hearts-container {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .floating-heart {
    position: absolute; bottom: -60px;
    font-size: var(--size);
    animation: floatUp var(--dur) ease-in infinite var(--delay);
    opacity: 0;
  }
  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) rotate(0deg) scale(0.5); }
    10% { opacity: 0.7; }
    90% { opacity: 0.3; }
    100% { opacity: 0; transform: translateY(-100vh) rotate(var(--rot)) scale(1); }
  }

  /* ── Glow Orbs ── */
  .orb {
    position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none;
  }
  .orb-1 {
    width: 400px; height: 400px; top: -100px; left: -100px;
    background: radial-gradient(circle, rgba(236,72,153,.15) 0%, transparent 70%);
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb-2 {
    width: 350px; height: 350px; bottom: -80px; right: -80px;
    background: radial-gradient(circle, rgba(168,85,247,.12) 0%, transparent 70%);
    animation: orbFloat 10s ease-in-out infinite 2s;
  }
  .orb-3 {
    width: 300px; height: 300px; top: 40%; left: 50%;
    background: radial-gradient(circle, rgba(244,114,182,.08) 0%, transparent 70%);
    animation: orbFloat 12s ease-in-out infinite 4s;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(30px, -20px); }
    66% { transform: translate(-20px, 15px); }
  }

  /* ── Card ── */
  .card {
    position: relative; z-index: 10;
    text-align: center; padding: 60px 50px;
    max-width: 580px; width: 90%;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(244,114,182,.15);
    border-radius: 24px;
    backdrop-filter: blur(16px);
    box-shadow: 0 0 60px rgba(236,72,153,.08), 0 20px 60px rgba(0,0,0,.4);
    animation: cardAppear 1.5s ease both;
  }
  @keyframes cardAppear {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Heart Icon ── */
  .heart-icon {
    font-size: 50px;
    animation: heartBeat 1.3s ease-in-out infinite;
    display: inline-block;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 20px rgba(236,72,153,.5));
  }
  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.2); }
    28% { transform: scale(1); }
    42% { transform: scale(1.15); }
    56% { transform: scale(1); }
  }

  /* ── Name ── */
  .name {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(42px, 8vw, 68px);
    background: linear-gradient(135deg, #f9a8d4 0%, #f472b6 30%, #e879f9 60%, #c084fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 8px;
    animation: nameGlow 3s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(244,114,182,.3));
  }
  @keyframes nameGlow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(244,114,182,.2)); }
    50% { filter: drop-shadow(0 0 40px rgba(244,114,182,.5)); }
  }

  /* ── Message ── */
  .message {
    font-size: clamp(22px, 4vw, 32px);
    color: rgba(255,255,255,.85);
    font-weight: 400;
    font-style: italic;
    line-height: 1.5;
    margin: 16px 0 30px;
    animation: fadeInUp 2s ease 0.5s both;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .highlight {
    color: #f9a8d4;
    font-weight: 600;
    font-style: normal;
  }

  /* ── Divider ── */
  .divider {
    width: 80px; height: 1px; margin: 0 auto 28px;
    background: linear-gradient(90deg, transparent, rgba(244,114,182,.5), transparent);
    animation: fadeInUp 2s ease 0.8s both;
  }

  /* ── From ── */
  .from {
    animation: fadeInUp 2s ease 1s both;
  }
  .from-label {
    font-size: 13px; color: rgba(255,255,255,.35);
    text-transform: uppercase; letter-spacing: 4px; margin-bottom: 8px;
  }
  .from-name {
    font-family: 'Great Vibes', cursive;
    font-size: 30px;
    color: rgba(255,255,255,.7);
  }
  .from-sub {
    font-size: 15px; color: rgba(244,114,182,.6);
    font-style: italic; margin-top: 6px;
  }

  /* ── Sparkle on click ── */
  .sparkle {
    position: fixed; pointer-events: none; z-index: 999;
    font-size: 20px;
    animation: sparkleAnim .8s ease forwards;
  }
  @keyframes sparkleAnim {
    0% { opacity: 1; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
    100% { opacity: 0; transform: scale(0.5) rotate(360deg) translateY(-40px); }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Floating Hearts -->
<div class="hearts-container" id="hearts"></div>

<!-- Glow Orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Card -->
<div class="card">
  <div class="heart-icon">💖</div>
  <div class="name">Sthefany Effica</div>
  <div class="message">
    Te quiero mucho, <span class="highlight">hermosa</span> ✨<br>
    Eres lo más lindo de mi vida
  </div>
  <div class="divider"></div>
  <div class="from">
    <div class="from-label">Con todo mi amor</div>
    <div class="from-name">Gustavo Reyes</div>
    <div class="from-sub">tu hombre 💕</div>
  </div>
</div>

<script>
// ── Generate Stars ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.cssText = `
    left: ${Math.random() * 100}%;
    top: ${Math.random() * 100}%;
    width: ${Math.random() * 2.5 + 0.5}px;
    height: ${Math.random() * 2.5 + 0.5}px;
    --dur: ${Math.random() * 3 + 2}s;
    --delay: ${Math.random() * 4}s;
  `;
  starsEl.appendChild(star);
}

// ── Generate Floating Hearts ──
const heartsEl = document.getElementById('hearts');
const heartEmojis = ['💖', '💕', '💗', '💓', '✨', '🌸', '💜', '💘'];
for (let i = 0; i < 18; i++) {
  const heart = document.createElement('div');
  heart.className = 'floating-heart';
  heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  heart.style.cssText = `
    left: ${Math.random() * 100}%;
    --size: ${Math.random() * 18 + 14}px;
    --dur: ${Math.random() * 8 + 6}s;
    --delay: ${Math.random() * 10}s;
    --rot: ${Math.random() * 60 - 30}deg;
  `;
  heartsEl.appendChild(heart);
}

// ── Click Sparkles ──
document.addEventListener('click', (e) => {
  const emojis = ['💖', '✨', '💕', '🌸', '💗'];
  for (let i = 0; i < 3; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    sparkle.style.left = (e.clientX + (Math.random() * 40 - 20)) + 'px';
    sparkle.style.top = (e.clientY + (Math.random() * 40 - 20)) + 'px';
    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 800);
  }
});
</script>
</body>
</html>
